<!DOCTYPE html>
<html>
    <head>
        <title>nonrice.github.io</title>
        <link rel="shortcut icon" type="image/png" href="resources/favicon.png"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="stylesheet" href="/stylesheets/stylesheet.css">
    </head>
    <body class="vertical-center">
        <div class="mx-auto" style="padding: 10px">
            <div class="row navfade1">
                <h1 class="display-1 navitem-header navitem" id="navitem-header" onclick="window.location.href='/'"">
                    nonrice.github.io
                </h1>
            </div>
            <div class="row navfade2">
                <h1 class="display-1 navitem" onclick="window.location.href='/about'">
                     About
                </h1>
            </div>
            <div class="row navfade3">
                <h1 class="display-1 navitem" onclick="window.location.href='/projects'">
                     Projects    
                </h1>
            </div>
        </div>
        <script>
            var mq = window.matchMedia( "(max-width: 500px)" );
            if (mq.matches) {
                document.getElementById("navitem-header").textContent = "~/nonrice"
            } else {
                document.getElementById("navitem-header").textContent = "nonrice.github.io"
            }

            document.getElementsByTagName("BODY")[0].onresize = function(){
                var mq = window.matchMedia( "(max-width: 500px)" );
                if (mq.matches) {
                    document.getElementById("navitem-header").textContent = "~/nonrice"
                } else {
                    document.getElementById("navitem-header").textContent = "nonrice.github.io"
                }
            }
        </script>
    </body>
</html>
